<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dark UI - Staircase Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menggunakan font Inter untuk kesan modern dan mewah */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap');
        
        body {
            /* Background gradasi dari hitam pekat ke #0E0E10 di bawah */
            background: linear-gradient(180deg, #000000 0%, #050505 60%, #0E0E10 100%);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden; /* Mencegah scrollbar */
            height: 100vh;
        }

        /* -----------------------------------------------------------
           1. Dynamic Staircase Structure (Pertahankan Desain Sebelumnya)
           ----------------------------------------------------------- */
        .stair-container {
            display: grid;
            grid-template-columns: repeat(9, 1fr); /* 4 Kiri + 1 Tengah + 4 Kanan */
            gap: 1px; /* Garis pemisah super tipis */
            align-items: flex-end;
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none; /* Klik bisa menembus tangga */
            z-index: 5;
        }

        .stair-item {
            position: relative;
            background-color: #000000; /* Kotak Hitam Pekat */
            height: 100%;
            border-radius: 0; /* Lancip/Tajam */
        }

        /* a. Stroke Atas: Napas Putih Lambat */
        .stair-item::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1.5px;
            background: #fff;
            z-index: 8;
            /* Waktu Napas Slow: 12 detik */
            animation: whiteBreathSlow 12s infinite ease-in-out;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* b. Stroke Atas: Molten Steel (Api Kilat) */
        .molten-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4.5px; /* Tebal di atas napas putih */
            /* Gradient Besi Membara */
            background: linear-gradient(90deg, 
                transparent 0%, 
                #ff4500 30%, 
                #ff8c00 50%, 
                #ffd700 70%, 
                transparent 100%
            );
            background-size: 200% 100%;
            z-index: 10;
            /* Muncul Kilat: 15 detik */
            animation: moltenFlash 15s infinite linear;
            filter: drop-shadow(0 0 8px rgba(255, 69, 0, 0.8));
            opacity: 0;
        }

        /* c. Stroke Samping (Garis Tepi) */
        .side-line {
            position: absolute;
            top: 0; right: 0;
            width: 1.5px;
            height: 100%;
            z-index: 7;
        }
        .side-standby { 
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0%, transparent 60%); 
        }
        .side-fade { 
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, transparent 80%); 
            animation: slowFade 10s infinite ease-in-out;
        }

        /* 2. Definisi Animasi (Pertahankan) */
        @keyframes whiteBreathSlow {
            0%, 100% { opacity: 0.03; filter: blur(1.5px); }
            50% { opacity: 0.5; filter: blur(0px); }
        }
        @keyframes moltenFlash {
            0% { background-position: 200% 0; opacity: 0; }
            2% { opacity: 1; }
            8% { opacity: 1; }
            12% { background-position: -200% 0; opacity: 0; }
            100% { background-position: -200% 0; opacity: 0; }
        }
        @keyframes slowFade { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* 3. Delay & Staggered Effects (Pertahankan) */
        .stair-item:nth-child(3n+1)::before { animation-delay: 0s; }
        .stair-item:nth-child(3n+2)::before { animation-delay: 4s; }
        .stair-item:nth-child(3n+3)::before { animation-delay: 8s; }

        .stair-item:nth-child(1) .molten-line { animation-delay: 2s; }
        .stair-item:nth-child(3) .molten-line { animation-delay: 9s; }
        .stair-item:nth-child(5) .molten-line { animation-delay: 0s; } /* Tengah */
        .stair-item:nth-child(7) .molten-line { animation-delay: 5s; }
        .stair-item:nth-child(9) .molten-line { animation-delay: 12s; }

        /* 4. Hero Content Ambience Glow */
        .hero-glow {
            position: absolute;
            top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            width: 800px; height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 70%);
            filter: blur(100px);
            z-index: 1;
        }
    </style>
</head>
<body class="text-white">

    <div class="hero-glow"></div>

    <nav class="fixed top-0 z-50 flex items-center justify-between w-full px-12 py-10">
        <div class="flex items-center">
            <svg width="18" height="18" viewBox="0 0 40 40" fill="none">
                <rect x="20" y="0" width="20" height="20" fill="white"/>
                <circle cx="10" cy="30" r="10" fill="white" fill-opacity="0.4"/>
            </svg>
        </div>
        
        <ul class="hidden md:flex gap-10 text-[10px] font-medium text-gray-500 tracking-[0.2em] uppercase">
            <li class="transition cursor-pointer hover:text-white">Product</li>
            <li class="transition cursor-pointer hover:text-white">Pricing</li>
            <li class="transition cursor-pointer hover:text-white">Docs</li>
            <li class="transition cursor-pointer hover:text-white">FAQ</li>
            <li class="transition cursor-pointer hover:text-white">Forum</li>
        </ul>

        <button class="border border-white/20 px-8 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-white hover:text-black hover:border-white transition duration-500">
            Get Started
        </button>
    </nav>

    <main class="relative z-20 flex flex-col items-center justify-center h-screen overflow-hidden">
        
        <div class="max-w-4xl px-6 -mt-32 text-center">
            <h1 class="text-5xl md:text-[85px] font-normal leading-[1.05] tracking-tighter mb-10 text-white">
                Built for real-time <br> decisions, <span class="text-gray-700/80">not spreadsheet</span>
            </h1>
            
            <div class="flex flex-col items-center gap-8">
                <button class="px-12 py-4 text-sm font-bold text-black transition duration-500 bg-white rounded-full shadow-2xl hover:scale-105 hover:bg-gray-200">
                    Explore the platform
                </button>
                <a href="#" class="flex items-center gap-2 cursor-pointer group">
                    <span class="text-gray-600 text-[10px] uppercase tracking-[0.4em] group-hover:text-white transition duration-300">
                        View demo
                    </span>
                    <svg class="w-2.5 h-2.5 text-gray-700 group-hover:text-white group-hover:translate-x-0.5 transition" fill="none" viewBox="0 0 10 10">
                        <path d="M1 5H9M9 5L5 1M9 5L5 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                    </svg>
                </a>
            </div>
        </div>

        <div class="stair-container">
            <div class="stair-item !h-[65vh]"><div class="molten-line"></div><div class="side-line side-standby"></div></div>
            <div class="stair-item !h-[55vh]"><div class="molten-line"></div><div class="side-line side-fade"></div></div>
            <div class="stair-item !h-[45vh]"><div class="molten-line"></div><div class="side-line side-standby"></div></div>
            <div class="stair-item !h-[35vh]"><div class="molten-line"></div><div class="side-line side-fade"></div></div>

            <div class="stair-item !h-[28vh]"><div class="molten-line"></div></div> 

            <div class="stair-item !h-[35vh]"><div class="molten-line"></div><div class="side-line side-fade"></div></div>
            <div class="stair-item !h-[45vh]"><div class="molten-line"></div><div class="side-line side-standby"></div></div>
            <div class="stair-item !h-[55vh]"><div class="molten-line"></div><div class="side-line side-fade"></div></div>
            <div class="stair-item !h-[65vh]"><div class="molten-line"></div><div class="side-line side-standby"></div></div>
        </div>
    </main>

</body>
</html>
